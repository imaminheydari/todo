<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — To-Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    :root {
      --bg: #0f0f1a;
      --bg2: #1a1a2e;
      --card: rgba(255,255,255,0.05);
      --card-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --text: #e2e8f0;
      --text-dim: #64748b;
      --accent: #818cf8;
      --accent-glow: rgba(129,140,248,0.3);
      --danger: #f87171;
      --success: #34d399;
      --warning: #fbbf24;
      --high: #f87171;
      --medium: #fbbf24;
      --low: #34d399;
      --cat-work: #818cf8;
      --cat-personal: #f472b6;
      --cat-shopping: #34d399;
      --cat-health: #f87171;
      --cat-study: #fbbf24;
      --cat-other: #94a3b8;
      --radius: 16px;
      --radius-sm: 10px;
    }

    [data-theme="light"] {
      --bg: #faf6f1;
      --bg2: #fffcf8;
      --card: rgba(0,0,0,0.045);
      --card-hover: rgba(0,0,0,0.075);
      --border: rgba(0,0,0,0.10);
      --text: #3a3a3e;
      --text-dim: #9a9390;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px 80px;
      transition: background 0.3s, color 0.3s;
      color: var(--text);
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: #818cf8;
      top: -150px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: #f472b6;
      bottom: -100px; right: -80px;
    }

    .app {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .header-left h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-left p {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      gap: 6px;
    }

    .theme-toggle {
      width: 44px; height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .theme-toggle:hover {
      background: var(--card-hover);
      transform: scale(1.05);
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .stat-card {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .stat-card .num {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-card .label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 24px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .progress-bar {
      height: 6px;
      background: var(--card);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #f472b6);
      border-radius: 3px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Input area */
    .input-area {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .input-main {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .input-main input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-main input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-main input[type="text"]::placeholder {
      color: var(--text-dim);
    }

    .btn-add {
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn-add:active { transform: scale(0.97); }

    /* Options row */
    .input-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }

    .input-options-row2 {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .priority-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.75rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .priority-btn:hover { border-color: var(--text-dim); }

    .priority-btn.active[data-p="high"] {
      border-color: var(--high); color: var(--high); background: rgba(248,113,113,0.1);
    }
    .priority-btn.active[data-p="medium"] {
      border-color: var(--medium); color: var(--medium); background: rgba(251,191,36,0.1);
    }
    .priority-btn.active[data-p="low"] {
      border-color: var(--low); color: var(--low); background: rgba(52,211,153,0.1);
    }

    .category-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.75rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .category-btn:hover { border-color: var(--text-dim); }

    .category-btn.active[data-cat="work"] {
      border-color: var(--cat-work); color: var(--cat-work); background: rgba(129,140,248,0.1);
    }
    .category-btn.active[data-cat="personal"] {
      border-color: var(--cat-personal); color: var(--cat-personal); background: rgba(244,114,182,0.1);
    }
    .category-btn.active[data-cat="shopping"] {
      border-color: var(--cat-shopping); color: var(--cat-shopping); background: rgba(52,211,153,0.1);
    }
    .category-btn.active[data-cat="health"] {
      border-color: var(--cat-health); color: var(--cat-health); background: rgba(248,113,113,0.1);
    }
    .category-btn.active[data-cat="study"] {
      border-color: var(--cat-study); color: var(--cat-study); background: rgba(251,191,36,0.1);
    }
    .category-btn.active[data-cat="other"] {
      border-color: var(--cat-other); color: var(--cat-other); background: rgba(148,163,184,0.1);
    }

    .due-input {
      padding: 5px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }
    .due-input::-webkit-calendar-picker-indicator {
      filter: invert(0.6);
      cursor: pointer;
    }

    /* Notes textarea */
    .notes-input {
      width: 100%;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 36px;
      max-height: 100px;
      transition: border-color 0.2s;
    }
    .notes-input:focus { border-color: var(--accent); }
    .notes-input::placeholder { color: var(--text-dim); }

    /* Sort bar */
    .sort-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .sort-bar label {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 500;
    }

    .sort-bar select {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .sort-bar select:focus { border-color: var(--accent); }

    .sort-bar select.sort-newest {
      border-color: var(--accent);
      background: rgba(129,140,248,0.15);
      color: var(--accent);
    }
    .sort-bar select.sort-oldest {
      border-color: #f472b6;
      background: rgba(244,114,182,0.15);
      color: #f472b6;
    }
    .sort-bar select.sort-priority {
      border-color: var(--high);
      background: rgba(248,113,113,0.15);
      color: var(--high);
    }
    .sort-bar select.sort-due {
      border-color: var(--warning);
      background: rgba(251,191,36,0.15);
      color: var(--warning);
    }
    .sort-bar select.sort-alpha {
      border-color: var(--success);
      background: rgba(52,211,153,0.15);
      color: var(--success);
    }

    .sort-bar .toolbar-btns {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.8rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .search-box {
      flex: 1;
      min-width: 140px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 0.8rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-dim); }

    /* Task list */
    .task-list {
      list-style: none;
      min-height: 60px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      backdrop-filter: blur(10px);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: grab;
      position: relative;
    }

    .task-item:hover {
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .task-item.dragging {
      opacity: 0.5;
      transform: scale(0.98);
    }

    .task-item.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task-item.removing {
      animation: slideOut 0.25s forwards;
    }

    @keyframes slideOut {
      to { opacity: 0; transform: translateX(30px); height: 0; padding: 0; margin: 0; overflow: hidden; }
    }

    .priority-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .priority-dot.high { background: var(--high); box-shadow: 0 0 8px rgba(248,113,113,0.5); }
    .priority-dot.medium { background: var(--medium); box-shadow: 0 0 8px rgba(251,191,36,0.5); }
    .priority-dot.low { background: var(--low); box-shadow: 0 0 8px rgba(52,211,153,0.5); }

    .task-check {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.2s;
      color: transparent;
      font-size: 0.7rem;
    }

    .task-check:hover { border-color: var(--accent); }

    .task-check.checked {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .task-content {
      flex: 1;
      min-width: 0;
    }

    .task-text {
      font-size: 0.95rem;
      color: var(--text);
      word-break: break-word;
      line-height: 1.4;
      transition: all 0.2s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--text-dim);
    }

    .task-description {
      margin-top: 8px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .task-meta {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .task-tag {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    .task-tag.due {
      background: rgba(129,140,248,0.15);
      color: var(--accent);
    }

    .task-tag.overdue {
      background: rgba(248,113,113,0.15);
      color: var(--danger);
    }

    .task-tag.created {
      background: rgba(255,255,255,0.05);
      color: var(--text-dim);
    }

    .task-tag.cat-work { background: rgba(129,140,248,0.15); color: var(--cat-work); }
    .task-tag.cat-personal { background: rgba(244,114,182,0.15); color: var(--cat-personal); }
    .task-tag.cat-shopping { background: rgba(52,211,153,0.15); color: var(--cat-shopping); }
    .task-tag.cat-health { background: rgba(248,113,113,0.15); color: var(--cat-health); }
    .task-tag.cat-study { background: rgba(251,191,36,0.15); color: var(--cat-study); }
    .task-tag.cat-other { background: rgba(148,163,184,0.15); color: var(--cat-other); }

    /* Subtasks */
    .subtask-list {
      margin-top: 8px;
      padding-left: 4px;
    }

    .subtask-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    .subtask-check {
      width: 16px; height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 0.6rem;
      color: transparent;
    }

    .subtask-check.checked {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .subtask-text {
      font-size: 0.82rem;
      color: var(--text-dim);
      flex: 1;
      min-width: 0;
    }

    .subtask-text.done {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .subtask-delete {
      width: 20px; height: 20px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.15s;
    }
    .subtask-item:hover .subtask-delete { opacity: 1; }
    .subtask-delete:hover { color: var(--danger); }

    .add-subtask-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .add-subtask-row input {
      flex: 1;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.8rem;
      font-family: inherit;
      outline: none;
    }
    .add-subtask-row input:focus { border-color: var(--accent); }
    .add-subtask-row input::placeholder { color: var(--text-dim); }

    .add-subtask-row button {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .add-subtask-row button:hover { background: rgba(129,140,248,0.1); }

    .task-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-item:hover .task-actions { opacity: 1; }

    .task-actions button {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .task-actions button:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    .task-actions button.del:hover {
      background: rgba(248,113,113,0.15);
      color: var(--danger);
    }

    /* Edit input */
    .edit-input {
      width: 100%;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1.5px solid var(--accent);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-dim);
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .empty-state p {
      font-size: 0.85rem;
    }

    /* Footer */
    .footer {
      margin-top: 20px;
      text-align: center;
    }

    .footer-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .clear-btn {
      padding: 8px 20px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(248,113,113,0.08);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(20px);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast-text {
      font-size: 0.85rem;
      color: var(--text);
    }

    .toast-undo {
      padding: 4px 12px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: rgba(129,140,248,0.1);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toast-undo:hover {
      background: var(--accent);
      color: #fff;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 380px;
      width: 90%;
      text-align: center;
    }

    .modal-box h3 {
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: var(--text);
    }

    .modal-box p {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .modal-actions button {
      padding: 8px 20px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-actions .btn-confirm {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
    }
    .modal-actions .btn-confirm:hover { opacity: 0.9; }
    .modal-actions .btn-cancel:hover { border-color: var(--text-dim); }

    /* Keyboard shortcuts bar */
    .shortcuts-bar {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .shortcut-hint {
      font-size: 0.7rem;
      color: var(--text-dim);
      opacity: 0.6;
    }

    .shortcut-hint kbd {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--card);
      font-family: inherit;
      font-size: 0.65rem;
      margin: 0 2px;
    }

    /* Import file input hidden */
    #importFileInput { display: none; }

    /* Responsive */
    @media (max-width: 480px) {
      .stats { gap: 6px; }
      .stat-card { padding: 10px 8px; }
      .stat-card .num { font-size: 1.2rem; }
      .input-options, .input-options-row2 { flex-direction: column; align-items: stretch; }
      .task-actions { opacity: 1; }
      .sort-bar { flex-direction: column; align-items: stretch; }
      .sort-bar .toolbar-btns { margin-left: 0; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <h1>⚡ TaskFlow</h1>
        <p id="dateDisplay"></p>
      </div>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card"><div class="num" id="totalCount">0</div><div class="label">Total</div></div>
      <div class="stat-card"><div class="num" id="activeCount" style="color: var(--warning)">0</div><div class="label">Active</div></div>
      <div class="stat-card"><div class="num" id="doneCount" style="color: var(--success)">0</div><div class="label">Done</div></div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-info">
        <span>Progress</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-main">
        <input type="text" id="taskInput" placeholder="What needs to be done?" autofocus />
        <button class="btn-add" onclick="addTask()">Add Task</button>
      </div>
      <div class="input-options">
        <button class="priority-btn active" data-p="low" onclick="setPriority('low',this)">🟢 Low</button>
        <button class="priority-btn" data-p="medium" onclick="setPriority('medium',this)">🟡 Medium</button>
        <button class="priority-btn" data-p="high" onclick="setPriority('high',this)">🔴 High</button>
        <input type="date" class="due-input" id="dueInput" title="Set due date" />
      </div>
      <div class="input-options-row2">
        <button class="category-btn active" data-cat="work" onclick="setCategory('work',this)">💼 Work</button>
        <button class="category-btn" data-cat="personal" onclick="setCategory('personal',this)">👤 Personal</button>
        <button class="category-btn" data-cat="shopping" onclick="setCategory('shopping',this)">🛒 Shopping</button>
        <button class="category-btn" data-cat="health" onclick="setCategory('health',this)">❤️ Health</button>
        <button class="category-btn" data-cat="study" onclick="setCategory('study',this)">📚 Study</button>
        <button class="category-btn" data-cat="other" onclick="setCategory('other',this)">📌 Other</button>
      </div>
      <textarea class="notes-input" id="notesInput" placeholder="Add notes (optional)..." rows="1"></textarea>
    </div>

    <!-- Sort bar -->
    <div class="sort-bar">
      <label>Sort:</label>
      <select id="sortSelect" onchange="updateSortStyle(); render()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="priority">Priority (High → Low)</option>
        <option value="due">Due date</option>
        <option value="alpha">A → Z</option>
      </select>
      <div class="toolbar-btns">
        <button class="icon-btn" onclick="exportTasks()" title="Export tasks as JSON">📤 Export</button>
        <button class="icon-btn" onclick="document.getElementById('importFileInput').click()" title="Import tasks from JSON">📥 Import</button>
        <input type="file" id="importFileInput" accept=".json" onchange="importTasks(event)" />
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
      <button class="filter-btn" onclick="setFilter('completed',this)">Completed</button>
      <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search tasks..." oninput="render()" />
    </div>

    <!-- Tasks -->
    <ul class="task-list" id="taskList"></ul>

    <!-- Footer -->
    <div class="footer" id="footer" style="display:none">
      <div class="footer-row">
        <button class="clear-btn" onclick="confirmClearCompleted()">🗑 Clear completed</button>
      </div>
    </div>

    <!-- Keyboard shortcuts hint -->
    <div class="shortcuts-bar">
      <span class="shortcut-hint"><kbd>Enter</kbd> Add task</span>
      <span class="shortcut-hint"><kbd>Ctrl</kbd>+<kbd>F</kbd> Search</span>
      <span class="shortcut-hint"><kbd>Ctrl</kbd>+<kbd>D</kbd> Toggle theme</span>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-text" id="toastText"></span>
    <button class="toast-undo" id="toastUndo" onclick="undoDelete()">Undo</button>
  </div>

  <script>
    const STORAGE_KEY = 'taskflow-tasks';
    const THEME_KEY = 'taskflow-theme';
    let currentPriority = 'low';
    let currentCategory = 'work';
    let currentFilter = 'all';
    let dragSrcIndex = null;
    let deletedTask = null;
    let toastTimeout = null;

    // Category icons map
    const catIcons = { work: '💼', personal: '👤', shopping: '🛒', health: '❤️', study: '📚', other: '📌' };
    const catLabels = { work: 'Work', personal: 'Personal', shopping: 'Shopping', health: 'Health', study: 'Study', other: 'Other' };

    // Priority sort order
    const priorityOrder = { high: 0, medium: 1, low: 2 };

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      initDate();
      initTheme();
      updateSortStyle();
      render();
      initKeyboardShortcuts();
    });

    function initDate() {
      const d = new Date();
      const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('dateDisplay').textContent = d.toLocaleDateString('en-US', opts);
    }

    function initTheme() {
      const saved = localStorage.getItem(THEME_KEY) || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      document.querySelector('.theme-toggle').textContent = saved === 'dark' ? '🌙' : '☀️';
    }

    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem(THEME_KEY, next);
      document.querySelector('.theme-toggle').textContent = next === 'dark' ? '🌙' : '☀️';
    }

    function getTasks() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    function saveTasks(t) { localStorage.setItem(STORAGE_KEY, JSON.stringify(t)); }

    function setPriority(p, btn) {
      currentPriority = p;
      document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function setCategory(c, btn) {
      currentCategory = c;
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }

      const dueVal = document.getElementById('dueInput').value;
      const notes = document.getElementById('notesInput').value.trim();
      const tasks = getTasks();
      tasks.unshift({
        id: Date.now(),
        text,
        done: false,
        priority: currentPriority,
        category: currentCategory,
        due: dueVal || null,
        notes: notes || null,
        subtasks: [],
        created: new Date().toISOString()
      });
      saveTasks(tasks);
      input.value = '';
      document.getElementById('dueInput').value = '';
      document.getElementById('notesInput').value = '';
      input.focus();
      render();
    }

    function toggleTask(id) {
      const tasks = getTasks();
      const t = tasks.find(t => t.id === id);
      if (t) t.done = !t.done;
      saveTasks(tasks);
      render();
    }

    function deleteTask(id) {
      const tasks = getTasks();
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      deletedTask = { task: { ...task }, tasks: [...tasks] };

      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) {
        el.classList.add('removing');
        setTimeout(() => {
          const updated = getTasks().filter(t => t.id !== id);
          saveTasks(updated);
          render();
        }, 250);
      }

      showToast('Task deleted');
    }

    function undoDelete() {
      if (!deletedTask) return;
      saveTasks(deletedTask.tasks);
      deletedTask = null;
      hideToast();
      render();
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastText').textContent = msg;
      toast.classList.add('show');
      if (toastTimeout) clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
        deletedTask = null;
      }, 4000);
    }

    function hideToast() {
      const toast = document.getElementById('toast');
      toast.classList.remove('show');
      if (toastTimeout) clearTimeout(toastTimeout);
    }

    function startEdit(id) {
      const tasks = getTasks();
      const t = tasks.find(t => t.id === id);
      if (!t) return;
      const textEl = document.querySelector(`[data-id="${id}"] .task-text`);
      if (!textEl) return;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'edit-input';
      input.value = t.text;

      input.addEventListener('blur', () => finishEdit(id, input.value));
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') { input.value = t.text; input.blur(); }
      });

      textEl.replaceWith(input);
      input.focus();
      input.select();
    }

    function finishEdit(id, newText) {
      const text = newText.trim();
      if (!text) return deleteTask(id);
      const tasks = getTasks();
      const t = tasks.find(t => t.id === id);
      if (t) { t.text = text; saveTasks(tasks); }
      render();
    }

    // Subtasks
    function addSubtask(taskId) {
      const input = document.querySelector(`[data-id="${taskId}"] .add-subtask-row input`);
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;

      const tasks = getTasks();
      const t = tasks.find(t => t.id === taskId);
      if (!t) return;
      if (!t.subtasks) t.subtasks = [];
      t.subtasks.push({ id: Date.now(), text, done: false });
      saveTasks(tasks);
      render();
    }

    function toggleSubtask(taskId, subId) {
      const tasks = getTasks();
      const t = tasks.find(t => t.id === taskId);
      if (!t || !t.subtasks) return;
      const sub = t.subtasks.find(s => s.id === subId);
      if (sub) sub.done = !sub.done;
      saveTasks(tasks);
      render();
    }

    function deleteSubtask(taskId, subId) {
      const tasks = getTasks();
      const t = tasks.find(t => t.id === taskId);
      if (!t || !t.subtasks) return;
      t.subtasks = t.subtasks.filter(s => s.id !== subId);
      saveTasks(tasks);
      render();
    }

    // Notes
    function startEditNotes(id) {
      const tasks = getTasks();
      const t = tasks.find(t => t.id === id);
      if (!t) return;

      const notesEl = document.querySelector(`[data-id="${id}"] .task-description`);
      const editBtn = document.querySelector(`[data-id="${id}"] .notes-edit-btn`);

      if (notesEl && editBtn) {
        // Already showing notes, toggle to edit mode
        const textarea = document.createElement('textarea');
        textarea.className = 'edit-input';
        textarea.style.minHeight = '50px';
        textarea.style.resize = 'vertical';
        textarea.value = t.notes || '';

        textarea.addEventListener('blur', () => {
          const tasks2 = getTasks();
          const t2 = tasks2.find(t => t.id === id);
          if (t2) { t2.notes = textarea.value.trim() || null; saveTasks(tasks2); }
          render();
        });
        textarea.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') textarea.blur();
        });

        notesEl.replaceWith(textarea);
        editBtn.style.display = 'none';
        textarea.focus();
      } else {
        // No notes yet, create inline edit
        const contentEl = document.querySelector(`[data-id="${id}"] .task-content`);
        if (!contentEl) return;

        const textarea = document.createElement('textarea');
        textarea.className = 'edit-input';
        textarea.style.minHeight = '50px';
        textarea.style.resize = 'vertical';
        textarea.style.marginTop = '8px';
        textarea.value = t.notes || '';
        textarea.placeholder = 'Add notes...';

        textarea.addEventListener('blur', () => {
          const tasks2 = getTasks();
          const t2 = tasks2.find(t => t.id === id);
          if (t2) { t2.notes = textarea.value.trim() || null; saveTasks(tasks2); }
          render();
        });
        textarea.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') textarea.blur();
        });

        contentEl.appendChild(textarea);
        textarea.focus();
      }
    }

    // Confirm dialogs
    function confirmClearCompleted() {
      const doneCount = getTasks().filter(t => t.done).length;
      if (doneCount === 0) return;
      showModal('Clear Completed', `Are you sure you want to remove ${doneCount} completed task${doneCount > 1 ? 's' : ''}?`, () => {
        const tasks = getTasks().filter(t => !t.done);
        saveTasks(tasks);
        render();
      });
    }

    function showModal(title, message, onConfirm) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-box">
          <h3>${title}</h3>
          <p>${message}</p>
          <div class="modal-actions">
            <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
            <button class="btn-confirm" id="modalConfirmBtn">Confirm</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector('#modalConfirmBtn').addEventListener('click', () => {
        overlay.remove();
        onConfirm();
      });
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
      });
    }

    // Export / Import
    function exportTasks() {
      const tasks = getTasks();
      if (tasks.length === 0) {
        showToast('No tasks to export');
        return;
      }
      const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `taskflow-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('Tasks exported!');
    }

    function importTasks(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (!Array.isArray(imported)) throw new Error('Invalid format');
          // Merge: add imported tasks that don't exist yet
          const existing = getTasks();
          const existingIds = new Set(existing.map(t => t.id));
          let added = 0;
          imported.forEach(t => {
            if (!existingIds.has(t.id)) {
              // Ensure all required fields
              existing.push({
                id: t.id || Date.now() + added,
                text: t.text || 'Untitled',
                done: !!t.done,
                priority: t.priority || 'low',
                category: t.category || 'other',
                due: t.due || null,
                notes: t.notes || null,
                subtasks: t.subtasks || [],
                created: t.created || new Date().toISOString()
              });
              added++;
            }
          });
          saveTasks(existing);
          render();
          showToast(`Imported ${added} new task${added !== 1 ? 's' : ''}`);
        } catch (err) {
          showToast('Invalid JSON file');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // Drag & Drop
    function onDragStart(e, id) {
      dragSrcIndex = getTasks().findIndex(t => t.id === id);
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
    }

    function onDragOver(e, id) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) el.classList.add('drag-over');
    }

    function onDragLeave(e) {
      const el = document.querySelector(`[data-id="${e.target.closest('.task-item')?.dataset.id}"]`);
      if (el) el.classList.remove('drag-over');
    }

    function onDrop(e, id) {
      e.preventDefault();
      const targetIndex = getTasks().findIndex(t => t.id === id);
      if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;

      const tasks = getTasks();
      const [moved] = tasks.splice(dragSrcIndex, 1);
      tasks.splice(targetIndex, 0, moved);
      saveTasks(tasks);
      dragSrcIndex = null;
      render();
    }

    function formatDue(dueStr) {
      const due = new Date(dueStr + 'T00:00:00');
      const now = new Date();
      now.setHours(0,0,0,0);
      const diff = Math.ceil((due - now) / (1000*60*60*24));
      const formatted = due.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (diff < 0) return `<span class="task-tag overdue">⚠ Overdue (${formatted})</span>`;
      if (diff === 0) return `<span class="task-tag overdue">Due today</span>`;
      if (diff === 1) return `<span class="task-tag due">Due tomorrow</span>`;
      return `<span class="task-tag due">📅 ${formatted}</span>`;
    }

    function formatCreated(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function renderSubtasks(taskId, subtasks) {
      if (!subtasks || subtasks.length === 0) return '';
      const items = subtasks.map(s => `
        <div class="subtask-item">
          <button class="subtask-check ${s.done ? 'checked' : ''}" onclick="toggleSubtask(${taskId}, ${s.id})">
            ${s.done ? '✓' : ''}
          </button>
          <span class="subtask-text ${s.done ? 'done' : ''}">${escapeHtml(s.text)}</span>
          <button class="subtask-delete" onclick="deleteSubtask(${taskId}, ${s.id})" title="Remove subtask">✕</button>
        </div>
      `).join('');

      return `
        <div class="subtask-list">
          ${items}
          <div class="add-subtask-row">
            <input type="text" placeholder="Add subtask..." onkeydown="if(event.key==='Enter'){event.stopPropagation();addSubtask(${taskId});}" />
            <button onclick="addSubtask(${taskId})">+</button>
          </div>
        </div>
      `;
    }

    function render() {
      const tasks = getTasks();
      const search = document.getElementById('searchBox').value.toLowerCase();
      const sortBy = document.getElementById('sortSelect').value;

      let filtered = tasks.filter(t => {
        if (currentFilter === 'active' && t.done) return false;
        if (currentFilter === 'completed' && !t.done) return false;
        if (search && !t.text.toLowerCase().includes(search) && !(t.notes && t.notes.toLowerCase().includes(search))) return false;
        return true;
      });

      // Sort
      filtered.sort((a, b) => {
        switch (sortBy) {
          case 'oldest':
            return new Date(a.created) - new Date(b.created);
          case 'priority':
            return (priorityOrder[a.priority] ?? 2) - (priorityOrder[b.priority] ?? 2);
          case 'due':
            if (!a.due && !b.due) return 0;
            if (!a.due) return 1;
            if (!b.due) return -1;
            return new Date(a.due) - new Date(b.due);
          case 'alpha':
            return a.text.localeCompare(b.text);
          case 'newest':
          default:
            return new Date(b.created) - new Date(a.created);
        }
      });

      // Stats
      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      const active = total - done;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('activeCount').textContent = active;
      document.getElementById('doneCount').textContent = done;

      const pct = total ? Math.round((done / total) * 100) : 0;
      document.getElementById('progressPct').textContent = pct + '%';
      document.getElementById('progressFill').style.width = pct + '%';

      // Footer
      document.getElementById('footer').style.display = done > 0 ? 'block' : 'none';

      // Tasks
      const list = document.getElementById('taskList');

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">${search ? '🔍' : (currentFilter === 'completed' ? '🎉' : '🚀')}</div>
            <h3>${search ? 'No matching tasks' : (currentFilter === 'completed' ? 'No completed tasks yet' : (currentFilter === 'active' ? 'All done! Nothing active.' : 'No tasks yet'))}</h3>
            <p>${search ? 'Try a different search term' : (currentFilter === 'completed' ? 'Complete some tasks to see them here' : 'Add your first task above to get started')}</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(t => {
        const cat = t.category || 'other';
        const hasSubtasks = t.subtasks && t.subtasks.length > 0;
        const subtaskProgress = hasSubtasks
          ? `<span class="task-tag cat-${cat}">${t.subtasks.filter(s => s.done).length}/${t.subtasks.length} subtasks</span>`
          : '';
        return `
          <li class="task-item ${t.done ? 'done' : ''}" data-id="${t.id}"
              draggable="true"
              ondragstart="onDragStart(event, ${t.id})"
              ondragend="onDragEnd(event)"
              ondragover="onDragOver(event, ${t.id})"
              ondragleave="onDragLeave(event)"
              ondrop="onDrop(event, ${t.id})">
            <div class="priority-dot ${t.priority}"></div>
            <button class="task-check ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})">
              ${t.done ? '✓' : ''}
            </button>
            <div class="task-content">
              <span class="task-text">${escapeHtml(t.text)}</span>
              ${t.notes ? `<div class="task-description">${escapeHtml(t.notes)}</div>` : ''}
              ${renderSubtasks(t.id, t.subtasks)}
              <div class="task-meta">
                <span class="task-tag cat-${cat}">${catIcons[cat] || '📌'} ${catLabels[cat] || 'Other'}</span>
                ${t.due ? formatDue(t.due) : ''}
                ${subtaskProgress}
                <span class="task-tag created">Created ${formatCreated(t.created)}</span>
              </div>
            </div>
            <div class="task-actions">
              <button onclick="startEdit(${t.id})" title="Edit task">✏️</button>
              <button onclick="startEditNotes(${t.id})" title="Edit notes">📝</button>
              <button class="del" onclick="deleteTask(${t.id})" title="Delete task">🗑</button>
            </div>
          </li>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // Keyboard shortcuts
    function updateSortStyle() {
      const sel = document.getElementById('sortSelect');
      sel.className = 'sort-' + sel.value;
    }

    function initKeyboardShortcuts() {
      document.addEventListener('keydown', (e) => {
        // Ctrl+F or Cmd+F → focus search
        if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
          e.preventDefault();
          document.getElementById('searchBox').focus();
        }
        // Ctrl+D or Cmd+D → toggle theme
        if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
          e.preventDefault();
          toggleTheme();
        }
      });

      document.getElementById('taskInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) addTask();
      });
    }
  </script>
</body>
</html>
